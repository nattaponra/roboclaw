# Minimal RoboClaw Configuration Example
# This is the simplest configuration to get started

robot:
  name: "Minimal Robot"
  platform: raspberry-pi-4
  description: "A minimal robot example"

llm:
  provider: openai
  model: gpt-4
  api_key: ${OPENAI_API_KEY}
  # Or use ollama for local LLM:
  # provider: custom
  # base_url: http://localhost:11434/v1
  # model: llama2

features:
  voice:
    enabled: false
  vision:
    enabled: false

memory:
  path: "./data/memory.db"
  max_conversations: 100

automation:
  schedule: []

skills:
  builtin:
    - greeting
  custom: []
